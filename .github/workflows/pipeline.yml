# .github/workflows/pipeline.yml
name: Maritime Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (YYYY) - e.g. 2025'
        required: false
      month:
        description: 'Month (1-12) - Optional'
        required: false
      day:
        description: 'Day (1-31) - Optional'
        required: false

env:
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_SECRET }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  etl-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: 1. Ingest AIS Data (Extract & Load)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_SECRET }}
          YEAR: ${{ inputs.year }}
          MONTH: ${{ inputs.month }}
          DAY: ${{ inputs.day }}
        run: |
          # Construct command based on inputs
          CMD="python -m src.ingest_motherduck"

          if [ -n "$YEAR" ]; then CMD="$CMD --year $YEAR"; fi
          if [ -n "$MONTH" ]; then CMD="$CMD --month $MONTH"; fi
          if [ -n "$DAY" ]; then CMD="$CMD --day $DAY"; fi

          echo "Running: $CMD"
          $CMD

      - name: 2. Transform Data (dbt)
        run: |
          dbt deps
          dbt build --profiles-dir . --target prod

      - name: 3. Evidence Dashboard Build (Optional Preview)
        # This step assumes you might want to publish evidence reports later
        run: |
          echo "Evidence build skipped for this iteration - check index.md"
