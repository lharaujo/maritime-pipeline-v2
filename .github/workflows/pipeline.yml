# .github/workflows/pipeline.yml
name: Maritime Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:      # Manual trigger

env:
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PYTHON_VERSION: '3.12'

jobs:
  etl-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb polars pyarrow pandas numpy scipy beautifulsoup4 requests zstandard searoute dbt-duckdb

      - name: 1. Ingest AIS Data (Extract & Load)
        env:
          # Default to yesterday if not specified
          TARGET_DATE: "yesterday" 
        run: |
          python src/ingest_motherduck.py

      - name: 2. Transform Data (dbt)
        run: |
          dbt deps
          dbt build --profiles-dir . --target prod

      - name: 3. Evidence Dashboard Build (Optional Preview)
        # This step assumes you might want to publish evidence reports later
        run: |
          echo "Evidence build skipped for this iteration - check index.md"
