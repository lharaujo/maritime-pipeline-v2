# .github/workflows/pipeline.yml
name: Maritime Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (YYYY) - e.g. 2025'
        required: false
      month:
        description: 'Month (1-12) - Optional'
        required: false
      day:
        description: 'Day (1-31) - Optional'
        required: false

env:
  # injected globally for all steps
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_SECRET }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  etl-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . beautifulsoup4

      - name: 1. Ingest AIS Data (Extract & Load)
        env: # Inputs mapped to env vars
          YEAR: ${{ inputs.year }}
          MONTH: ${{ inputs.month }}
          DAY: ${{ inputs.day }}
        run: |
          # Construct command based on inputs
          CMD="python -m src.ingest_motherduck"

          if [ -n "$YEAR" ]; then CMD="$CMD --year $YEAR"; fi
          if [ -n "$MONTH" ]; then CMD="$CMD --month $MONTH"; fi
          if [ -n "$DAY" ]; then CMD="$CMD --day $DAY"; fi

          echo "Running: $CMD"
          $CMD

      - name: 2. Transform Data (dbt)
        run: |
          dbt deps
          dbt build --profiles-dir . --target prod

      - name: 2b. Upload Operations Metadata
        if: always() # Runs even if dbt fails
        run: |
          python src/upload_artifacts.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Evidence Dashboard Build
        if: always() # Attempt build even if previous steps had partial failures
        run: |
          npm install
          ./node_modules/.bin/evidence build

      - name: Upload Evidence Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.evidence/build

  deploy-pages:
    needs: etl-pipeline
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
