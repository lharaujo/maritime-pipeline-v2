[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ais-voyage-engine"
version = "0.1.0"
description = "A cloud-native AIS data pipeline using Modal, Polars, and DuckDB."
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Your Name", email = "your.email@example.com" }]
dependencies = [
    "polars>=0.20.0",
    "duckdb>=0.10.0",
    "modal>=0.62.0",
    "requests>=2.31.0",
    "numpy>=1.26.0",
    "searoute>=1.1.0",
    "streamlit>=1.32.0",
    "pydeck>=0.8.0",
    "plotly>=5.18.0",
    "zstandard>=0.22.0",
    "beautifulsoup4>=4.12.0",
    "tqdm>=4.67.3",
    "scipy>=1.17.1",
    "python-dotenv>=1.2.2",
    "folium>=0.14.0",
    "streamlit-folium>=0.13.0",
]

[project.optional-dependencies]
dev = [
    "black==24.3.0",
    "flake8==7.0.0",
    "pytest>=8.0.0",
    "isort>=5.13.0",
    "pre-commit>=3.6.0",
]

[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = ">=3.12"
polars = ">=0.20.0"
duckdb = ">=0.10.0"
modal = ">=0.62.0"
requests = ">=2.31.0"
numpy = ">=1.26.0"
searoute = ">=1.1.0"
streamlit = ">=1.32.0"
pydeck = ">=0.8.0"
plotly = ">=5.18.0"
zstandard = ">=0.22.0"
beautifulsoup4 = ">=4.12.0"
tqdm = ">=4.67.3"
scipy = ">=1.17.1"
python-dotenv = ">=1.2.2"
folium = ">=0.14.0"
streamlit-folium = ">=0.13.0"
